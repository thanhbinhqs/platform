version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: platform-db
    environment:
      POSTGRES_DB: platform
      POSTGRES_USER: platform
      POSTGRES_PASSWORD: platform_secret
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U platform"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: platform-api
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://platform:platform_secret@postgres:5432/platform
      JWT_SECRET: change-me-in-production
      JWT_REFRESH_SECRET: change-me-too
      PORT: 4000
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: platform-web
    ports:
      - "3001:80"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  pgdata:
